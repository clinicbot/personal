<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <title>קביעת תור — דר' יונתן שפירא</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b1822; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #0b1822;
    }
    /* Loader sits behind the iframe — visible only while it fetches. */
    .loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8aa1b3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="loader">טוען צ'אט…</div>
  <iframe
    src="https://dermapoint.vercel.app/?embed=1"
    title="צ'אט קביעת תור"
    allow="clipboard-write"
  ></iframe>
</body>
</html>
